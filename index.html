<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zihin Fırtınası | Subjects_666</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #090e17;
            --bg-card: #131c2b;
            --accent: #00e676;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.06);
        }

        body { 
            margin: 0; background: var(--bg-main); color: var(--text-main); 
            font-family: 'Inter', sans-serif; min-height: 100vh; 
            display: flex; flex-direction: column; 
        }

        header { 
            background: #0b111a; padding: 25px 50px; 
            border-bottom: 1px solid var(--border); display: flex; 
            align-items: center; justify-content: space-between; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        
        .logo { color: var(--accent); font-size: 24px; font-weight: 800; letter-spacing: 1.5px; }
        .subtitle { color: var(--text-muted); font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; }

        main { flex: 1; padding: 50px; max-width: 1400px; margin: 0 auto; width: 100%; box-sizing: border-box; }

        .cards-container { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); 
            gap: 30px; 
        }

        .card { 
            background: var(--bg-card); border-radius: 24px; border: 1px solid var(--border); 
            overflow: hidden; cursor: pointer; position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            text-decoration: none; display: flex; flex-direction: column; 
        }
        
        .card:hover { 
            transform: translateY(-12px) scale(1.02); 
            border-color: var(--accent); 
            box-shadow: 0 20px 40px rgba(0, 230, 118, 0.15); 
        }

        .card-body { padding: 40px 20px; text-align: center; }
        
        /* Karıştırılmış Kelime Stili */
        .scrambled-text { 
            margin: 0; color: white; font-size: 28px; font-weight: 800; 
            text-transform: uppercase; letter-spacing: 4px; 
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.2));
        }

        .hint-text { 
            margin-top: 15px; font-size: 11px; color: var(--text-muted); 
            text-transform: uppercase; letter-spacing: 1px; font-weight: 600;
        }
        
        .stat-overlay {
            position: absolute; top: 15px; right: 15px;
            background: rgba(0, 230, 118, 0.1); color: var(--accent);
            padding: 4px 10px; border-radius: 10px; font-size: 10px;
            font-weight: 800; border: 1px solid rgba(0, 230, 118, 0.2);
        }

        .empty-state { 
            text-align: center; color: var(--text-muted); 
            grid-column: 1 / -1; padding: 60px; background: var(--bg-card);
            border-radius: 30px; border: 1px dashed rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">SUBJECTS_666</div>
        <div class="subtitle">Kelimeyi Tahmin Et</div>
    </header>

    <main>
        <div class="cards-container" id="cards-container">
            </div>
    </main>

    <script>
        // Kelimeyi karıştırma fonksiyonu (Eğer admin panelinde karıştırılmadıysa diye yedek)
        function shuffle(word) {
            let a = word.split(""), n = a.length;
            for(let i = n - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                let tmp = a[i]; a[i] = a[j]; a[j] = tmp;
            }
            return a.join("");
        }

        function loadCards() {
            const container = document.getElementById('cards-container');
            const words = JSON.parse(localStorage.getItem('subjectWords')) || [];
            
            if (words.length === 0) {
                container.innerHTML = `<div class="empty-state">Henüz kelime eklenmemiş efendim.</div>`;
                return;
            }

            container.innerHTML = '';
            
            words.forEach(w => {
                let score = w.tries > 0 ? Math.round((w.hits / w.tries) * 100) : 0;
                // Admin'den gelen scrambled verisini kullan, yoksa burada karıştır
                let displayWord = w.scrambled || shuffle(w.name);
                
                container.innerHTML += `
                    <a href="word.html?key=${encodeURIComponent(w.name)}" class="card">
                        <div class="stat-overlay">%${score} Başarı</div>
                        <div class="card-body">
                            <h3 class="scrambled-text">${displayWord}</h3>
                            <div class="hint-text">Tahmin etmek için tıkla</div>
                        </div>
                    </a>
                `;
            });
        }

        window.onload = loadCards;
    </script>
</body>
</html>
