<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelime Listesi | Subjects_666</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #090e17;
            --bg-card: #131c2b;
            --accent: #00e676;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.06);
        }

        body { 
            margin: 0; 
            background: var(--bg-main); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }

        header { 
            background: #0b111a; 
            padding: 30px 50px; 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        
        .logo { 
            color: var(--accent); 
            font-size: 26px; 
            font-weight: 800; 
            letter-spacing: 1.5px; 
            text-shadow: 0 0 15px rgba(0, 230, 118, 0.2); 
        }
        
        .subtitle { 
            color: var(--text-muted); 
            font-size: 14px; 
            font-weight: 600; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }

        main { 
            flex: 1; 
            padding: 50px; 
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .cards-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 35px; 
        }

        .card { 
            background: var(--bg-card); 
            border-radius: 20px; 
            border: 1px solid var(--border); 
            overflow: hidden; 
            cursor: pointer; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            text-decoration: none; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
        }
        
        .card:hover { 
            transform: translateY(-10px); 
            border-color: rgba(0, 230, 118, 0.4); 
            box-shadow: 0 20px 40px rgba(0, 230, 118, 0.15); 
        }

        .card-img { 
            width: 100%; 
            height: 220px; 
            object-fit: cover; 
            border-bottom: 1px solid var(--border); 
            background: #000; 
        }

        .card-body { 
            padding: 25px; 
            text-align: center; 
        }
        
        .card-title { 
            margin: 0 0 12px 0; 
            color: white; 
            font-size: 22px; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
        }
        
        .stat-badge { 
            display: inline-block; 
            background: rgba(255,255,255,0.03); 
            color: var(--text-muted); 
            padding: 8px 16px; 
            border-radius: 20px; 
            font-size: 13px; 
            font-weight: 600; 
            border: 1px solid var(--border); 
            transition: all 0.3s;
        }
        
        .card:hover .stat-badge {
            background: rgba(0, 230, 118, 0.1);
            color: var(--accent);
            border-color: rgba(0, 230, 118, 0.2);
        }
        
        .empty-state { 
            text-align: center; 
            color: var(--text-muted); 
            font-size: 18px; 
            margin-top: 100px; 
            font-weight: 600;
            grid-column: 1 / -1;
            padding: 40px;
            background: var(--bg-card);
            border-radius: 20px;
            border: 1px dashed rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">SUBJECTS_666</div>
        <div class="subtitle">Pratik Seçim Ekranı</div>
    </header>

    <main>
        <div class="cards-container" id="cards-container">
            </div>
    </main>

    <script>
        function loadCards() {
            const container = document.getElementById('cards-container');
            const words = JSON.parse(localStorage.getItem('subjectWords')) || [];
            
            if (words.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 40px; margin-bottom: 15px; opacity: 0.5;">📭</div>
                        Sistemde henüz bir kelime bulunmuyor.<br>Lütfen yönetim panelinden yeni veri ekleyiniz.
                    </div>`;
                container.style.display = 'block';
                return;
            }

            container.style.display = 'grid';
            container.innerHTML = '';
            
            words.forEach(w => {
                let score = w.tries > 0 ? Math.round((w.hits / w.tries) * 100) : 0;
                container.innerHTML += `
                    <a href="word.html?key=${encodeURIComponent(w.name)}" class="card">
                        <img src="${w.img}" class="card-img" alt="${w.name}">
                        <div class="card-body">
                            <h3 class="card-title">${w.name}</h3>
                            <div class="stat-badge">Genel Başarı: %${score}</div>
                        </div>
                    </a>
                `;
            });
        }

        // Sayfa yüklendiğinde kartları getir
        window.onload = loadCards;
    </script>
</body>
</html>
