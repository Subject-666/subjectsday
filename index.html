<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speaking Feelings |  by Subject_666</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #060910;
            --accent: #00e676;
            --accent-glow: rgba(0, 230, 118, 0.3);
            --text-main: #e2e8f0;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; }
        
        body {
            margin: 0;
            height: 100vh;
            background: var(--bg-main);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Dinamik Arka Plan Izgarası */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(0, 230, 118, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 230, 118, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg) translateY(-20%);
            z-index: 0;
            pointer-events: none;
        }

        /* Mouse Takip Eden Neon Aura */
        .glow {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--accent-glow), transparent 70%);
            pointer-events: none;
            left: 0px;
            top: 0px;
            z-index: 1;
            mix-blend-mode: screen;
            transition: transform 0.15s ease-out;
        }

        .card {
            position: relative;
            z-index: 2;
            background: rgba(13, 19, 30, 0.8);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 60px 45px;
            border-radius: 40px;
            border: 1px solid var(--border);
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            text-align: center;
            width: 100%;
            max-width: 440px;
            animation: cardAppear 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-container { margin-bottom: 40px; }
        
        h1 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 2px;
            margin: 0;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .tagline {
            font-size: 12px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-top: 10px;
            font-weight: 600;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 18px 25px;
            border-radius: 20px;
            border: 1px solid var(--border);
            outline: none;
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 16px;
            transition: 0.3s;
            text-align: center;
            letter-spacing: 1px;
        }

        input:focus {
            border-color: var(--accent);
            background: rgba(0, 230, 118, 0.05);
            box-shadow: 0 0 20px rgba(0, 230, 118, 0.1);
        }

        button {
            width: 100%;
            padding: 18px;
            border-radius: 20px;
            border: none;
            background: var(--accent);
            color: #060910;
            font-weight: 800;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px var(--accent-glow);
            filter: brightness(1.1);
        }

        .credit {
            position: fixed;
            bottom: 30px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #475569;
            font-weight: 700;
        }

        /* Mobil Optimizasyon */
        @media (max-width: 480px) {
            .card { padding: 50px 30px; margin: 20px; }
            h1 { font-size: 26px; }
            .glow { width: 300px; height: 300px; }
        }
    </style>
</head>
<body>

    <div class="glow" id="glow"></div>

    <div class="card">
        <div class="logo-container">
            <h1>Speaking Feelings</h1>
            <div class="tagline">using Artificial Intelligence</div>
        </div>
        
        <div class="input-wrapper">
            <input id="key" placeholder="ANAHTAR KELİME" autocomplete="off" spellcheck="false">
        </div>
        
        <button onclick="go()">Sisteme Giriş Yap</button>
    </div>

    <div class="credit">Subject_666 tarafından</div>

    <script>
        const glow = document.getElementById("glow");
        
        // Mouse hareketi ile yumuşak takip
        document.addEventListener("mousemove", (e) => {
            const x = e.clientX - 300;
            const y = e.clientY - 300;
            glow.style.transform = `translate(${x}px, ${y}px)`;
        });

        // Dokunmatik cihazlar için basit takip
        document.addEventListener("touchmove", (e) => {
            const x = e.touches[0].clientX - 150;
            const y = e.touches[0].clientY - 150;
            glow.style.transform = `translate(${x}px, ${y}px)`;
        });

        function go() {
            const k = document.getElementById("key").value.trim();
            if(!k) return;

            // Admin Kapısı
            if(k === "Subject_666") {
                location.href = "admin.html";
                return;
            }

            // Test Sayfasına Yönlendirme
            location.href = "word.html?key=" + encodeURIComponent(k);
        }

        // Enter tuşu desteği
        document.getElementById("key").addEventListener("keypress", (e) => {
            if (e.key === "Enter") go();
        });
    </script>
</body>
</html>
