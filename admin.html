<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | Subjects_666</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0b1120; --card: #111827; --accent: #00ff88; --border: rgba(255,255,255,0.08); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Inter', sans-serif; display: flex; height: 100vh; }
        aside { width: 280px; background: #0d1117; padding: 40px 20px; border-right: 1px solid var(--border); }
        main { flex: 1; padding: 50px; overflow-y: auto; }
        .card { background: var(--card); border-radius: 16px; border: 1px solid var(--border); padding: 30px; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; font-size: 12px; opacity: 0.4; padding: 15px; border-bottom: 1px solid var(--border); text-transform: uppercase; }
        td { padding: 20px 15px; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .word-main { font-weight: 700; font-size: 18px; display: block; }
        .status-badge { background: rgba(0, 255, 136, 0.1); color: var(--accent); padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 700; }
        input[type="text"], input[type="file"] { background: #0b0f1a; border: 1px solid var(--border); padding: 14px; border-radius: 12px; color: white; width: 100%; margin-bottom: 10px; }
        .btn-add { background: var(--accent); color: #000; border: none; padding: 14px 30px; border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%; }
        #modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index:1000; align-items:center; justify-content:center; }
        .modal-box { background: #1f2937; padding: 40px; border-radius: 24px; width: 450px; border: 1px solid var(--border); }
        .img-preview { width: 100px; height: 60px; object-fit: cover; border-radius: 8px; background: #000; }
    </style>
</head>
<body>
    <aside><div style="color:var(--accent); font-size:24px; font-weight:900;">SUBJECTS_666</div></aside>
    <main>
        <div class="card">
            <h3 style="margin-top:0">Yeni Kelime ve Görsel Ekle</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                <input type="text" id="in-name" placeholder="Kelime Giriniz">
                <input type="file" id="in-file" accept="image/*">
            </div>
            <button class="btn-add" onclick="processAndAdd()">Sisteme Kaydet</button>
        </div>
        <div class="card">
            <table>
                <thead><tr><th>GÖRSEL</th><th>KELİME</th><th>BAŞARI ANALİZİ</th><th>DURUM</th><th>DETAY</th><th>İŞLEM</th></tr></thead>
                <tbody id="list"></tbody>
            </table>
        </div>
    </main>

    <div id="modal"><div class="modal-box">
        <h2 id="m-title" style="margin-top:0">Veri Analizi</h2>
        <canvas id="m-chart" style="margin-bottom:20px; max-height: 180px;"></canvas>
        <button onclick="resetStats()" style="background:#ff4d4d; color:white; border:none; padding:12px; border-radius:12px; font-weight:bold; width:100%; cursor:pointer; margin-bottom:10px">İstatistikleri Sıfırla</button>
        <button onclick="closeModal()" style="background:none; border:none; color:white; width:100%; cursor:pointer; opacity:0.5; padding:10px">Paneli Kapat</button>
    </div></div>

    <script>
        let data = JSON.parse(localStorage.getItem('subjectWords')) || [];
        let chart = null;
        let curId = null;

        function render() {
            const list = document.getElementById('list');
            list.innerHTML = '';
            data.forEach(w => {
                let score = w.tries > 0 ? Math.round((w.hits / w.tries) * 100) : 0;
                list.innerHTML += `<tr>
                    <td><img src="${w.img}" class="img-preview"></td>
                    <td><span class="word-main">${w.name}</span></td>
                    <td><strong>%${score}</strong> (${w.hits} Doğru / ${w.tries} Deneme)</td>
                    <td><span class="status-badge">Aktif</span></td>
                    <td><button style="background:none; border:none; color:white; font-size:20px; cursor:pointer" onclick="openModal(${w.id})">➔</button></td>
                    <td><button onclick="del(${w.id})" style="background:none; border:none; color:#ff4d4d; cursor:pointer; font-weight:bold">Sil</button></td>
                </tr>`;
            });
            localStorage.setItem('subjectWords', JSON.stringify(data));
        }

        async function processAndAdd() {
            const nameInput = document.getElementById('in-name');
            const fileInput = document.getElementById('in-file');
            
            if(!nameInput.value) return alert("Efendim, lütfen bir kelime giriniz.");
            
            let imageData = "https://picsum.photos/400/250"; 

            if(fileInput.files && fileInput.files[0]) {
                imageData = await toBase64(fileInput.files[0]);
            }

            data.push({ id: Date.now(), name: nameInput.value.trim(), img: imageData, hits: 0, tries: 0 });
            render();
            nameInput.value = ''; fileInput.value = '';
        }

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        function openModal(id) {
            curId = id; 
            const w = data.find(x => x.id === id);
            document.getElementById('m-title').innerText = w.name + " Analizi";
            document.getElementById('modal').style.display = 'flex';
            
            const ctx = document.getElementById('m-chart').getContext('2d');
            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Başarılı', 'Hatalı'],
                    datasets: [{
                        data: [w.hits, (w.tries - w.hits < 0 ? 0 : w.tries - w.hits)],
                        backgroundColor: ['#00ff88', '#ff4d4d'],
                        borderWidth: 0
                    }]
                },
                options: { cutout: '70%', plugins: { legend: { position: 'bottom', labels: { color: 'white' } } } }
            });
        }

        function resetStats() {
            const w = data.find(x => x.id === curId);
            w.hits = 0; w.tries = 0;
            render(); closeModal();
        }

        function del(id) { if(confirm('Bu veriyi silmek istediğinize emin misiniz?')) { data = data.filter(x => x.id !== id); render(); } }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        
        render();
    </script>
</body>
</html>
