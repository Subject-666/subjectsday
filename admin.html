<div class="card">
    <h3>Sistem Ses Ayarları</h3>
    <div style="display: flex; gap: 20px; align-items: center;">
        <span style="font-size: 14px; color: var(--text-muted);">Tercih Edilen Ses Karakteri:</span>
        <label style="cursor:pointer; display:flex; align-items:center; gap:8px;">
            <input type="radio" name="gender" value="female" checked onchange="saveVoicePref('female')"> 
            <span style="font-size:14px;">Kadın (Yumuşak)</span>
        </label>
        <label style="cursor:pointer; display:flex; align-items:center; gap:8px;">
            <input type="radio" name="gender" value="male" onchange="saveVoicePref('male')"> 
            <span style="font-size:14px;">Erkek (Tok)</span>
        </label>
    </div>
</div>

<script>
    // Ses tercihini kaydetme fonksiyonu
    function saveVoicePref(gender) {
        localStorage.setItem('preferredGender', gender);
        console.log("Ses tercihi güncellendi: " + gender);
    }

    // Sayfa yüklendiğinde mevcut tercihi seçili getir
    window.addEventListener('DOMContentLoaded', () => {
        const pref = localStorage.getItem('preferredGender') || 'female';
        document.querySelector(`input[value="${pref}"]`).checked = true;
    });
</script>
