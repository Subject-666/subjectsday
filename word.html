<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice | Speaking Feelings</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; height: 100vh; background: #0b1120; display: flex; align-items: center; justify-content: center; font-family: sans-serif; color: white; overflow: hidden; }
        .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); padding: 40px; border-radius: 40px; text-align: center; width: 380px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        #word-image { width: 100%; height: 230px; object-fit: cover; border-radius: 20px; margin-bottom: 20px; background: #000; }
        h1 { font-size: 2.2rem; margin-bottom: 25px; color: #00ff88; text-transform: uppercase; letter-spacing: 2px; }
        button { width: 100%; padding: 18px; border-radius: 18px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 12px; font-size: 16px; transition: 0.2s; }
        
        .btn-audio { background: white; color: black; }
        
        .action-row { display: flex; gap: 10px; margin-top: 15px; }
        .btn-success { background: rgba(0, 255, 136, 0.1); color: #00ff88; border: 1px solid #00ff88; flex: 1; }
        .btn-success:hover { background: #00ff88; color: black; }
        .btn-fail { background: rgba(255, 77, 77, 0.1); color: #ff4d4d; border: 1px solid #ff4d4d; flex: 1; }
        .btn-fail:hover { background: #ff4d4d; color: white; }
        
        #msg { margin-top: 15px; font-weight: bold; min-height: 24px; font-size: 15px; }
    </style>
</head>
<body>

    <div class="card">
        <img id="word-image" src="" alt="Loading...">
        <h1 id="target-text">...</h1>
        <button class="btn-audio" onclick="playAudio()">🔊 Sesi Dinle</button>
        
        <div class="action-row">
            <button class="btn-success" onclick="recordResult(true)">✓ Doğru Bildim</button>
            <button class="btn-fail" onclick="recordResult(false)">✗ Yanlış Bildim</button>
        </div>
        
        <div id="msg"></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const key = params.get('key')?.toLowerCase();
        let words = JSON.parse(localStorage.getItem('subjectWords')) || [];
        const wInfo = words.find(x => x.name.toLowerCase() === key || x.scrambled?.toLowerCase() === key);
        
        const target = wInfo ? wInfo.name : (key || "test");
        document.getElementById('target-text').innerText = target;
        if(wInfo) document.getElementById('word-image').src = wInfo.img;

        function playAudio() {
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(target);
            utter.lang = 'en-US';
            window.speechSynthesis.speak(utter);
        }

        function recordResult(isSuccess) {
            const msg = document.getElementById('msg');
            
            if(wInfo) {
                wInfo.tries = (wInfo.tries || 0) + 1;
                
                if(isSuccess) {
                    wInfo.hits = (wInfo.hits || 0) + 1;
                    msg.innerHTML = "<span style='color:#00ff88'>Harika! Başarı kaydedildi.</span>";
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                } else {
                    msg.innerHTML = "<span style='color:#ff4d4d'>Sorun değil, tekrar deneyeceğiz.</span>";
                }
                
                localStorage.setItem('subjectWords', JSON.stringify(words));
            } else {
                msg.innerHTML = "Sistemde bu kelime bulunamadı.";
            }
        }
    </script>
</body>
</html>
