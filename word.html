<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Mode | Subject_666</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-main: #090e17; 
            --bg-card: #131c2b; 
            --accent: #00e676; 
            --accent-hover: #00c060;
            --danger: #ff4d4d;
            --danger-hover: #e60000;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.06); 
        }
        
        body { margin: 0; background: var(--bg-main); color: var(--text-main); font-family: 'Inter', sans-serif; display: flex; flex-direction: column; height: 100vh; align-items: center; justify-content: center; }
        
        .header { position: absolute; top: 40px; text-align: center; }
        .logo { color: var(--accent); font-size: 24px; font-weight: 800; letter-spacing: 2px; text-shadow: 0 0 15px rgba(0, 230, 118, 0.2); }
        .logo-sub { color: var(--text-muted); font-size: 13px; margin-top: 5px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }

        .card { background: var(--bg-card); border-radius: 20px; border: 1px solid var(--border); padding: 40px; width: 400px; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.4); position: relative; overflow: hidden; }
        
        .image-container { width: 100%; height: 220px; border-radius: 12px; overflow: hidden; margin-bottom: 25px; border: 1px solid var(--border); background: #070b12; display: flex; align-items: center; justify-content: center; }
        .image-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .word-display { font-size: 28px; font-weight: 800; color: white; margin-bottom: 30px; letter-spacing: 1px; min-height: 35px; }
        .hidden-word { filter: blur(8px); transition: filter 0.3s ease; cursor: pointer; user-select: none; }
        .hidden-word:hover { filter: blur(4px); }
        .revealed-word { filter: blur(0); }

        .btn-speak { background: transparent; border: 2px solid var(--accent); color: var(--accent); padding: 15px 30px; border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%; font-size: 16px; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-speak:hover { background: rgba(0, 230, 118, 0.1); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0, 230, 118, 0.15); }
        .btn-speak:active { transform: translateY(0); }

        .action-buttons { display: flex; gap: 15px; }
        .btn-action { flex: 1; padding: 15px; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 15px; transition: all 0.3s ease; text-transform: uppercase; border: none; }
        .btn-success { background: rgba(0, 230, 118, 0.1); color: var(--accent); border: 1px solid rgba(0, 230, 118, 0.2); }
        .btn-success:hover { background: var(--accent); color: #000; }
        .btn-danger { background: rgba(255, 77, 77, 0.1); color: var(--danger); border: 1px solid rgba(255, 77, 77, 0.2); }
        .btn-danger:hover { background: var(--danger); color: white; }

        .progress { color: var(--text-muted); font-size: 13px; margin-top: 25px; font-weight: 600; }
        .empty-state { color: var(--text-muted); font-size: 16px; padding: 40px 0; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">SUBJECT_666</div>
        <div class="logo-sub">Sinirsel Pratik Modu</div>
    </div>

    <div class="card" id="practice-card">
        </div>

    <script>
        let words = JSON.parse(localStorage.getItem('subjectWords')) || [];
        let currentIndex = 0;
        let isWordRevealed = false;
        const synth = window.speechSynthesis;

        function renderCard() {
            const card = document.getElementById('practice-card');
            
            if (words.length === 0) {
                card.innerHTML = `<div class="empty-state">Sistemde henüz veri bulunmuyor. Lütfen yönetim panelinden kelime ekleyin.</div>`;
                return;
            }

            if (currentIndex >= words.length) {
                card.innerHTML = `<div class="empty-state" style="color: var(--accent)">Tüm kelimeleri tamamladınız!<br><br><button class="btn-speak" onclick="resetPractice()" style="margin-top: 20px;">Baştan Başla</button></div>`;
                return;
            }

            const currentWord = words[currentIndex];
            isWordRevealed = false;

            card.innerHTML = `
                <div class="image-container">
                    <img src="${currentWord.img}" alt="Görsel">
                </div>
                <div class="word-display hidden-word" id="word-text" onclick="toggleWord()" title="Kelimeyi görmek için tıklayın">
                    ${currentWord.name}
                </div>
                <button class="btn-speak" onclick="speakCurrentWord()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                    Sesi Dinle
                </button>
                <div class="action-buttons">
                    <button class="btn-action btn-danger" onclick="processAnswer(false)">Bilemedim</button>
                    <button class="btn-action btn-success" onclick="processAnswer(true)">Bildim</button>
                </div>
                <div class="progress">İlerleme: ${currentIndex + 1} / ${words.length}</div>
            `;
        }

        function toggleWord() {
            const wordEl = document.getElementById('word-text');
            if (isWordRevealed) {
                wordEl.classList.add('hidden-word');
                wordEl.classList.remove('revealed-word');
            } else {
                wordEl.classList.remove('hidden-word');
                wordEl.classList.add('revealed-word');
            }
            isWordRevealed = !isWordRevealed;
        }

        function speakCurrentWord() {
            if (synth.speaking) {
                synth.cancel();
            }

            const word = words[currentIndex].name;
            const utterThis = new SpeechSynthesisUtterance(word);
            utterThis.lang = 'tr-TR';
            
            // Admin panelinden gelen ses tercihini oku
            const voicePref = localStorage.getItem('preferredGender') || 'female';
            const voices = synth.getVoices();
            
            // Türkçe sesleri filtrele
            const trVoices = voices.filter(v => v.lang.includes('tr'));
            
            if (trVoices.length > 0) {
                // Basit bir cinsiyet tahmini (Tarayıcıya göre ses isimleri değişebilir)
                if (voicePref === 'male') {
                    const maleVoice = trVoices.find(v => v.name.toLowerCase().includes('male') || v.name.toLowerCase().includes('tolga'));
                    utterThis.voice = maleVoice || trVoices[0];
                } else {
                    const femaleVoice = trVoices.find(v => v.name.toLowerCase().includes('female') || v.name.toLowerCase().includes('yelda'));
                    utterThis.voice = femaleVoice || trVoices[0];
                }
            }

            utterThis.rate = 0.9; // Biraz daha anlaşılır olması için hız ayarı
            synth.speak(utterThis);
        }

        function processAnswer(isCorrect) {
            // Veriyi güncelle
            words[currentIndex].tries += 1;
            if (isCorrect) {
                words[currentIndex].hits += 1;
            }
            
            // LocalStorage'a kaydet
            localStorage.setItem('subjectWords', JSON.stringify(words));
            
            // Sonraki kelimeye geç
            currentIndex++;
            renderCard();
        }

        function resetPractice() {
            currentIndex = 0;
            renderCard();
        }

        // Ses motorunu yüklemek için ufak bir bekleme (Tarayıcı uyumluluğu için)
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = renderCard;
        }
        
        // İlk render
        renderCard();
    </script>
</body>
</html>
